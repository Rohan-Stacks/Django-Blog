{% extends "base/base.html" %}
{% load crispy_forms_tags %} <!-- Allowing us to use the crispy filter on any forms-->
{% block content %}
    <div class="content-section">
      <form method="POST">
        {% csrf_token %} <!-- csrf_token adds security, now we can add the form variable that we passed in -->
        <fieldset class="form-group">
          <legend class="border-bottom mb-4">Join Today</legend>
          {{ form|crispy }} <!-- Accessing form and crispy to each form, for stylization-->
        </fieldset>
        <div class="form-group">
          <button class="btn btn-outline-info" type="submit">Sign Up</button> <!-- Stylizing -->
        </div>
      </form>
      <div class="border-top pt-3">
        <small class="text-muted">
          Already Have An Account? <a class="ml-2" href="{% url 'login' %}">Sign In</a> <!-- Incase the user already has an account to sign into, linking this as the register to the login page -->
        </small>
      </div>
    </div>
{% endblock content %}
