{% extends "base/base.html" %}
{% load crispy_forms_tags %} <!-- Allowing us to use the crispy filter on any forms-->
{% block content %}
    <div class="content-section">
      <form method="POST">
        {% csrf_token %} <!-- csrf_token adds security, now we can add the form variable that we passed in -->
        <fieldset class="form-group">
          <legend class="border-bottom mb-4">Blog Post</legend>
          {{ form|crispy }} <!-- Accessing form and crispy to each form, for stylization-->
        </fieldset>
        <div class="form-group">
          <button class="btn btn-outline-info" type="submit">Post</button> <!-- Stylizing -->
        </div>
      </form>
    </div>
{% endblock content %}
