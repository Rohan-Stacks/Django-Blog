{% extends "base/base.html" %}
{% block content %}
    <div class="content-section">
      <form method="POST">
        {% csrf_token %} <!-- csrf_token adds security, now we can add the form variable that we passed in -->
        <fieldset class="form-group">
          <legend class="border-bottom mb-4">Delete Post</legend>
          <h2>Are you sure you want to delete "{{ object.title }}"?</h2>
        </fieldset>
        <div class="form-group">
          <button class="btn btn-outline-danger" type="submit">Yes, Delete</button> <!-- Stylizing -->
          <a class="btn btn-outline-secondary" href="{% url 'post-detail' object.id %}" >Cancel</a>
        </div>
      </form>
    </div>
{% endblock content %}
